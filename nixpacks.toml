[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "nodejs_22"]

[variables]
PIP_BREAK_SYSTEM_PACKAGES = "1"

[phases.install]
cmds = [
    "pip install 'uvicorn[standard]' fastapi structlog pydantic python-multipart 'openai-agents[litellm]' 'twilio>=9.0,<10.0' beautifulsoup4 aiosmtplib httpx",
    "pip install -e ."
]

[start]
cmd = "python server.py"
