name: Feature Request
description: Suggest a new feature for Hauba
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: I want to be able to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Agent behavior
        - Tools (bash, files, browser, etc.)
        - Skills / Strategies
        - Voice / Channels
        - Web UI
        - Other
    validations:
      required: true
