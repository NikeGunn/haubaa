name: Deploy

on:
  push:
    branches: [main]

# Cancel any in-progress deploy when a new push arrives.
concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  deployments: write
  contents:    read

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest

    env:
      PRODUCTION_URL:     https://hauba.tech
      HEALTH_PATH:        /health
      RAILWAY_PROJECT_URL: https://railway.com/project/380fdf3d-367f-4ec5-83c7-2d49d077ee3e
      # Railway auto-deploys via its GitHub integration.
      # This workflow tracks the deployment status and verifies health.
      # Allow up to 5 minutes for Railway build + deploy + rolling restart.
      POLL_TIMEOUT:       300
      POLL_INTERVAL:      15

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 1. Create a GitHub Deployment so the commit shows a status bubble.  #
      # ------------------------------------------------------------------ #
      - name: Create GitHub deployment
        id: create-deploy
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createDeployment({
              owner:                  context.repo.owner,
              repo:                   context.repo.repo,
              ref:                    context.sha,
              environment:            'production',
              description:            'Railway production deployment',
              auto_merge:             false,
              required_contexts:      [],
              transient_environment:  false,
              production_environment: true,
            });
            core.setOutput('deployment_id', String(data.id));
            console.log(`Created GitHub deployment ${data.id}`);

      - name: Set status → in_progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner:           context.repo.owner,
              repo:            context.repo.repo,
              deployment_id:   ${{ steps.create-deploy.outputs.deployment_id }},
              state:           'in_progress',
              description:     'Railway is building and deploying…',
              log_url:         '${{ env.RAILWAY_PROJECT_URL }}',
              environment_url: '${{ env.PRODUCTION_URL }}',
            });

      # ------------------------------------------------------------------ #
      # 2. Wait for Railway to build & deploy, then verify /health.         #
      #    Railway's GitHub integration auto-deploys on push — no CLI       #
      #    needed. We just wait and verify.                                 #
      # ------------------------------------------------------------------ #
      - name: Wait for Railway healthcheck
        id: healthcheck
        run: |
          URL="${PRODUCTION_URL}${HEALTH_PATH}"
          DEADLINE=$(( $(date +%s) + POLL_TIMEOUT ))

          echo "Target : $URL"
          echo "Timeout: ${POLL_TIMEOUT}s  Interval: ${POLL_INTERVAL}s"
          echo ""
          echo "Railway auto-deploys via GitHub integration."
          echo "Waiting 60s for build to start…"
          sleep 60

          HEALTHY=false
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
            echo "  $(date -u '+%H:%M:%SZ')  HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              HEALTHY=true
              break
            fi
            sleep "$POLL_INTERVAL"
          done

          if [ "$HEALTHY" = "true" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "Railway is healthy."
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "Railway did not become healthy within ${POLL_TIMEOUT}s."
            exit 1
          fi

      # ------------------------------------------------------------------ #
      # 3a. Success.                                                        #
      # ------------------------------------------------------------------ #
      - name: Set status → success
        if: steps.healthcheck.outputs.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner:           context.repo.owner,
              repo:            context.repo.repo,
              deployment_id:   ${{ steps.create-deploy.outputs.deployment_id }},
              state:           'success',
              description:     'Deployed and healthy on Railway.',
              log_url:         '${{ env.RAILWAY_PROJECT_URL }}',
              environment_url: '${{ env.PRODUCTION_URL }}',
            });

      # ------------------------------------------------------------------ #
      # 3b. Failure.                                                        #
      # ------------------------------------------------------------------ #
      - name: Set status → failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const id = '${{ steps.create-deploy.outputs.deployment_id }}';
            if (!id) { console.log('No deployment ID — skipping.'); return; }
            await github.rest.repos.createDeploymentStatus({
              owner:           context.repo.owner,
              repo:            context.repo.repo,
              deployment_id:   parseInt(id),
              state:           'failure',
              description:     'Railway healthcheck timed out or deployment failed.',
              log_url:         '${{ env.RAILWAY_PROJECT_URL }}',
              environment_url: '${{ env.PRODUCTION_URL }}',
            });
