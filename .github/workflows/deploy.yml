name: Deploy

on:
  push:
    branches: [main]

# Cancel any in-progress deploy when a new push arrives.
concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  deployments: write
  contents:    read

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest

    env:
      PRODUCTION_URL:         https://hauba.tech
      HEALTH_PATH:            /health
      # Railway builds finish in 60-180 s; 300 s = 2× safety margin.
      POLL_TIMEOUT:           300
      POLL_INTERVAL:          10
      RAILWAY_PROJECT_ID:     380fdf3d-367f-4ec5-83c7-2d49d077ee3e
      RAILWAY_ENVIRONMENT_ID: aecb7e59-0232-4996-952e-4f3ded062f0d

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 1. Create a GitHub deployment for this SHA immediately so the       #
      #    commit shows a status bubble from the start.                     #
      # ------------------------------------------------------------------ #
      - name: Create GitHub deployment
        id: create-deploy
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createDeployment({
              owner:                  context.repo.owner,
              repo:                   context.repo.repo,
              ref:                    context.sha,
              environment:            'production',
              description:            'Railway production deployment',
              auto_merge:             false,
              required_contexts:      [],
              transient_environment:  false,
              production_environment: true,
            });
            core.setOutput('deployment_id', String(data.id));
            console.log(`Created GitHub deployment ${data.id}`);

      - name: Set status → in_progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner:           context.repo.owner,
              repo:            context.repo.repo,
              deployment_id:   ${{ steps.create-deploy.outputs.deployment_id }},
              state:           'in_progress',
              description:     'Railway building and deploying…',
              log_url:         'https://railway.com/project/380fdf3d-367f-4ec5-83c7-2d49d077ee3e',
              environment_url: '${{ env.PRODUCTION_URL }}',
            });

      # ------------------------------------------------------------------ #
      # 2. ACTIVELY trigger Railway to deploy the current commit via CLI.   #
      #    The old workflow only polled health — it never told Railway to   #
      #    deploy, which is why new commits were never picked up.           #
      #                                                                     #
      #    Prerequisites (one-time setup):                                  #
      #      1. Go to https://railway.com/account/tokens → create a token  #
      #      2. GitHub repo → Settings → Secrets and variables → Actions   #
      #         → New secret: RAILWAY_TOKEN = <your token>                  #
      # ------------------------------------------------------------------ #
      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Trigger Railway deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN secret not set — Railway will NOT auto-deploy."
            echo "  → Go to https://railway.com/account/tokens and create a token."
            echo "  → Add it as GitHub secret RAILWAY_TOKEN in repo Settings → Secrets."
            exit 0
          fi
          echo "Triggering Railway deployment for $GITHUB_SHA …"
          railway up \
            --no-gitignore \
            --detach \
            --service web \
            --environment production
          echo "Deployment triggered — waiting for health check."

      # ------------------------------------------------------------------ #
      # 3. Poll /health until Railway serves the new container.             #
      #    Sleep 40 s first to let the build + rolling restart begin.      #
      # ------------------------------------------------------------------ #
      - name: Wait for Railway healthcheck
        id: healthcheck
        run: |
          URL="${PRODUCTION_URL}${HEALTH_PATH}"
          DEADLINE=$(( $(date +%s) + POLL_TIMEOUT ))

          echo "Target : $URL"
          echo "Timeout: ${POLL_TIMEOUT}s  Interval: ${POLL_INTERVAL}s"
          echo "Giving Railway 40 s to start build / rolling restart…"
          sleep 40

          HEALTHY=false
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
            echo "  $(date -u '+%H:%M:%SZ')  HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              HEALTHY=true
              break
            fi
            sleep "$POLL_INTERVAL"
          done

          if [ "$HEALTHY" = "true" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            echo "✅ Railway is healthy."
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
            echo "❌ Railway did not become healthy within ${POLL_TIMEOUT}s."
            exit 1
          fi

      # ------------------------------------------------------------------ #
      # 4a. Success.                                                        #
      # ------------------------------------------------------------------ #
      - name: Set status → success
        if: steps.healthcheck.outputs.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner:           context.repo.owner,
              repo:            context.repo.repo,
              deployment_id:   ${{ steps.create-deploy.outputs.deployment_id }},
              state:           'success',
              description:     'Deployed and healthy on Railway.',
              log_url:         'https://railway.com/project/380fdf3d-367f-4ec5-83c7-2d49d077ee3e',
              environment_url: '${{ env.PRODUCTION_URL }}',
            });

      # ------------------------------------------------------------------ #
      # 4b. Failure.                                                        #
      # ------------------------------------------------------------------ #
      - name: Set status → failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const id = '${{ steps.create-deploy.outputs.deployment_id }}';
            if (!id) { console.log('No deployment ID — skipping.'); return; }
            await github.rest.repos.createDeploymentStatus({
              owner:           context.repo.owner,
              repo:            context.repo.repo,
              deployment_id:   parseInt(id),
              state:           'failure',
              description:     'Railway healthcheck timed out or deployment failed.',
              log_url:         'https://railway.com/project/380fdf3d-367f-4ec5-83c7-2d49d077ee3e',
              environment_url: '${{ env.PRODUCTION_URL }}',
            });
